<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chat with an AI Agent powered by n8n workflows.">
    <title>Chat — AI Agent Hub</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="bg-grid"></div>

    <div class="chat-wrapper">
        <!-- Header -->
        <div class="chat-header">
            <a href="/" class="chat-header__back" id="backBtn" title="Back to agents">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
            </a>
            <div class="chat-header__avatar" id="agentAvatar"></div>
            <div class="chat-header__info">
                <h2 id="agentName">Agent</h2>
                <span id="agentStatus">Online</span>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="chat-welcome" id="chatWelcome">
                <div class="chat-welcome__icon" id="welcomeIcon"></div>
                <h3 id="welcomeTitle">Hello!</h3>
                <p id="welcomeDesc">Type a message below to start the conversation.</p>
            </div>
        </div>

        <!-- Input -->
        <div class="chat-input">
            <form class="chat-input__form" id="chatForm">
                <input type="file" class="chat-input__file" id="fileInput" accept="image/*" style="display: none;" />
                <button type="button" class="chat-input__file-btn" id="fileBtn" title="Upload CV Image" style="display: none;">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </button>
                <input type="text" class="chat-input__field" id="messageInput" placeholder="Type your message…"
                    autocomplete="off" autofocus />
                <button type="submit" class="chat-input__btn" id="sendBtn" title="Send">
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script src="/js/chat.js"></script>
</body>

</html>
